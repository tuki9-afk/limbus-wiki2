<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limbus Company Wiki</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #120018, #1d002b, #2a0040);
      color: #f3eaff;
      min-height: 100vh;
    }

    header {
      background: rgba(10, 0, 20, 0.92);
      padding: 20px;
      text-align: center;
    }

    nav {
      margin-top: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      margin: 0 10px;
      font-weight: bold;
    }

    main {
      padding: 40px;
      text-align: center;
    }

    /* GATINHO */
    #pet {
      position: fixed;
      bottom: 20px;
      left: 0;
      width: 80px;
      height: 80px;
      z-index: 9999;
      pointer-events: none;
    }

    #pet img {
      width: 100%;
      height: 100%;
    }
  </style>
</head>

<body>

<header>
  <h1>Limbus Company Wiki</h1>
  <nav>
    <a href="index.html">Início</a>
    <a href="personagens.html">Personagens</a>
    <a href="historia.html">História</a>
    <a href="creditos.html">Créditos</a>
  </nav>
</header>

<main>
  <h2>Bem-vindo ao site</h2>
  <p>Apenas um site feito para mostrar uma wiki de um jogo
  </p>
</main>

<!-- GATINHO -->
<div id="pet">
  <img src="https://media.tenor.com/4AiXzf8l4wIAAAAi/chiikawa.gif">
</div>

<script>
const pet = document.getElementById("pet");

let x = 0;
let direction = 1;
let speed = 2;
let bob = 0;

function animatePet() {
  const maxX = window.innerWidth - pet.offsetWidth;

  x += speed * direction;
  bob += 0.1;

  if (x >= maxX) {
    direction = -1;
    pet.style.transform = "scaleX(-1)";
  }

  if (x <= 0) {
    direction = 1;
    pet.style.transform = "scaleX(1)";
  }

  pet.style.left = x + "px";
  pet.style.bottom = 20 + Math.sin(bob) * 6 + "px";

  requestAnimationFrame(animatePet);
}

animatePet();
</script>

</body>
</html>
